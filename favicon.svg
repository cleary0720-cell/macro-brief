<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1C1C2E"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" fill="url(#bg)"/>

  <!-- Gold outer frame -->
  <rect x="2" y="2" width="60" height="60" fill="none" stroke="#C9A84C" stroke-width="2"/>

  <!-- Red bottom bar -->
  <rect x="0" y="54" width="64" height="10" fill="#C41E3A"/>

  <!-- Gold line above red bar -->
  <line x1="2" y1="53" x2="62" y2="53" stroke="#C9A84C" stroke-width="1.5"/>

  <!-- Corner ornaments top-left -->
  <polyline points="2,14 2,2 14,2" fill="none" stroke="#C9A84C" stroke-width="2.5"/>
  <!-- Corner ornaments top-right -->
  <polyline points="50,2 62,2 62,14" fill="none" stroke="#C9A84C" stroke-width="2.5"/>

  <!-- Top center diamond -->
  <polygon points="32,7 35,12 32,17 29,12" fill="#C41E3A"/>
  <polygon points="32,8.5 34,12 32,15.5 30,12" fill="#C9A84C"/>

  <!-- Bold italic M -->
  <text x="32" y="50"
    text-anchor="middle"
    font-family="Georgia,'Times New Roman',serif"
    font-size="40"
    font-weight="900"
    font-style="italic"
    fill="#F6F1E7"
    letter-spacing="-1">M</text>

  <!-- Subtle gold underline beneath M -->
  <line x1="14" y1="51" x2="50" y2="51" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
</svg>
