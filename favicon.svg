<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Deep navy background -->
  <rect width="64" height="64" fill="#0D1B2A"/>

  <!-- Gold outer border -->
  <rect x="1.5" y="1.5" width="61" height="61" fill="none" stroke="#C9A84C" stroke-width="2.5"/>

  <!-- Gold top header rule -->
  <rect x="5" y="8" width="54" height="1.5" fill="#C9A84C"/>

  <!-- Corner brackets -->
  <polyline points="5,20 5,5 20,5" fill="none" stroke="#C9A84C" stroke-width="2.5"/>
  <polyline points="44,5 59,5 59,20" fill="none" stroke="#C9A84C" stroke-width="2.5"/>
  <polyline points="5,44 5,59 20,59" fill="none" stroke="#C9A84C" stroke-width="2.5"/>
  <polyline points="59,44 59,59 44,59" fill="none" stroke="#C9A84C" stroke-width="2.5"/>

  <!-- Gold italic M -->
  <text x="32" y="52"
    text-anchor="middle"
    font-family="Georgia,serif"
    font-size="44"
    font-weight="900"
    font-style="italic"
    fill="#C9A84C">M</text>
</svg>