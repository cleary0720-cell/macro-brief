<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Cream background -->
  <rect width="64" height="64" fill="#F6F1E7"/>

  <!-- Gold outer border -->
  <rect x="1.5" y="1.5" width="61" height="61" fill="none" stroke="#C9A84C" stroke-width="3"/>

  <!-- Gold inner border line -->
  <rect x="5" y="5" width="54" height="54" fill="none" stroke="#C9A84C" stroke-width="1"/>

  <!-- Corner ornaments -->
  <polyline points="5,18 5,5 18,5" fill="none" stroke="#C9A84C" stroke-width="2.5"/>
  <polyline points="46,5 59,5 59,18" fill="none" stroke="#C9A84C" stroke-width="2.5"/>
  <polyline points="5,46 5,59 18,59" fill="none" stroke="#C9A84C" stroke-width="2.5"/>
  <polyline points="59,46 59,59 46,59" fill="none" stroke="#C9A84C" stroke-width="2.5"/>

  <!-- Top center gold diamond -->
  <polygon points="32,8 35,12 32,16 29,12" fill="#C9A84C"/>

  <!-- Bold italic red M -->
  <text x="32" y="51"
    text-anchor="middle"
    font-family="Georgia,serif"
    font-size="42"
    font-weight="900"
    font-style="italic"
    fill="#C41E3A">M</text>
</svg>